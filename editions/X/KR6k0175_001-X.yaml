body:
  text: 餘杭靈芝蘭若元照錄校勘義鈔序科分二初題號二序文二初敘世傳訛二是下明今校對二初敘意分科二初下隨科牒釋三初撰述來意二初牒章二夫下隨釋三初明今正意二初別示二初事鈔本意二然下義鈔元由二是下雙結二或下別點異說三吾下引文誡證三初敘起二鈔下列四初引文證二又下以義證三又下約時證四又下憑古證三釋下指略二駮古異議二初牒章二通下隨釋二初引古二古下斥非三初指昔評量二原下明今正斷三初斥初義二又下斥次義三又下斥後義三用下總結示勸三校本差互二初標分二初下隨釋三初辨諸本二初標章二天下隨釋三初列示三本三初見行本二後下後古本三近下永嘉本二後下斥古妄分三今下明今所存二正名題二初標章二此下隨釋二初正明題目二又下因示撰號三定品次二初標章二自下隨釋三初元無品次二然下古本倒亂三昔下改正可取二初敘由二毗下列示拾毗尼義鈔科分二初題號二初標題二撰號二本文十六初毗尼大綱三初總標二第下列釋六初佛世不分二初標徵二如下隨釋二初示本有五名二初正明制意二若下反實證成二若下顯不分所以二初引文二何下義例二初舉三乘例顯二初正明二釋難二又下約二義釋通二辨廣略異三初標章二準下隨釋二初六佛具說二問下會諸教相違二初通四分律二初敘問二首下引答二初引首解答二更下牒前轉難二通涅槃經三此下結示三說戒時節二初標章二如下隨釋二初師資各說不同三初正明二故下引證三釋疑二然下如來自說遠近二初正明時節二善下重示異見四五師任持二初標章二依下隨釋三初詳定年數二第下列示相傳三初第一師二第二師三又下後三師三然下正顯不分五五部分張二初標章二然下隨釋二初本部初分二初通敘所因二又下引經委示二初大集經七如文二若下遺教法律二此下五部重分二初三藏口傳二佛下文殊問經六分總別二初標章二前下隨釋二初通分諸部二初正明二問下釋妨二專論四分三毗下結示二起戒差別三十三難四不學無知五轉業變根六破僧大意七時非時八四波羅夷九十三僧殘十二不定十一三十捨墮十二九十單提十三提舍尼十四眾學戒十五七滅諍十六四諍二起戒差別二初總標二第下列釋十初敘名略解二初標章二起下正釋二初通示五受二初總徵二一下別釋五如文二此下料簡二五二初明上法二初古解二又下今義二第下簡作業二初分示六種二初正示二釋妨二初問邊地獨言持律二初問答釋通二因下因問二事二初總問二解下別釋三如文二問遣信不同殺盜二然下結顯通別二僧尼通別二初標章二如下隨釋二初正示僧尼二初引婆論總示二摩下引諸文別簡三初善來上法二三下三歸三初正明二問下釋妨三比下簡示三婆下八敬二若下兼明時處二初對時二若下論處二初三洲四初善來八敬二初正明二問答二羯磨三上法四三語二初義決二故下引證二北洲三二覺得戒二初標章二若下隨釋二初正明二初如來得戒二初正示二初果中得二若下因中得三初引示二然下融會三又下覆釋二釋疑二初舉惡盡以問二引不護以難二獨覺得戒二初正問得否二引教申難二初敘難二釋通二初順婆論答二今下依善見解三若下引佛例證二釋妨二初問自然得名不同二問二覺假教以否四師資不同二初標章二婆下隨釋二初正明二初明五受二若下辨七眾二釋妨七初問善來佛秉二問八敬遙宣三問佛不作師四問尼無論義五問僧無遣信二初問答釋通二引難轉問六問上法不同二初引文以問二約義以答二初約方便答二又下約俱得答二初正解二釋妨三又下約從勝答二初正解二釋妨七問俗人得果二初問經律相違二問涅槃差別五位列凡聖二初標章二依下隨釋三初善來二三歸八敬二初準婆論局內凡二初正明二釋妨二又下約義通外凡三羯磨六發戒時節二初標章二善下隨釋五初善來二上法三三語二初正示二釋疑二初引智論立問二據母論答通二初總舉二一下列釋五初翻邪二五戒二初明簡淨二問時節三初敘問二答釋二初約受歸得二又下約說相得三首下簡判三八戒四十戒五具戒四八敬五羯磨二初引示二解二釋通疑妨二初引安居例難二問下約多義釋通三初舉不結反破二又下據所屬以分三又下約時法以簡七五受漸頓二初標章二婆下隨釋二初引論指局二今下約義皆通二初通示五受二別問羯磨二初舉頓違漸以問二初敘問二答通二初引論以解二若下引經以示二約夏例戒以難二初敘問二釋通二初正釋二若下轉難八作法不同二初標釋二善下正釋二初正明多少二初列示四受二善下對校差別三初八敬校善來二三下三語校八敬二初正示二三下會通三羯下羯磨校三語二此下兼示次第二初總列五受二別問三戒三初明三戒二羯下辨三歸三其下點八敬九受隨同異二初標章二同下隨釋二初無作戒二初明同二辨異二若下作戒二初明同二辨異十問答料簡二初標章二受下隨釋五初沙彌戒二初示方軌二釋疑妨二初問列相二問四依二沙彌尼戒二初問請師不同二問下引和上轉難三問下式叉戒二初問男女有無二學下示六法之相三初正明二問下釋疑三僧下指略四又下具足戒二初明和上是非三初和上非法二善下不乞不請三十下師不現前二問二師差別二初問戒師不差二初約義釋通二約結集難二問教師不知五本法尼戒二初開聽羯磨二初約義釋通二約法例難二又下受已說相三十三難三初標章二第下隨釋七初隨難略解四初總舉二此下列釋十初邊罪二初標二問下釋二初正示名義二初